[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "clumping-factor-calculations"
version = "0.1.0"
description = "Modular clumping factor calculations for TNG gas and dark matter data."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "scipy",
    "h5py",
    "matplotlib",
]

[project.optional-dependencies]
test = ["pytest"]

[project.scripts]
clumping-compute = "clumping_factor.cli:compute_main"
clumping-plot = "clumping_factor.cli:plot_main"
clumping-prepare-partials = "clumping_factor.partials:prepare_main"
clumping-summarize-partial = "clumping_factor.partials:summary_main"
clumping-merge-summaries = "clumping_factor.partials:merge_summaries_main"
clumping-compute-partial = "clumping_factor.partials:partial_main"
clumping-reduce-partials = "clumping_factor.partials:reduce_main"

[tool.setuptools.packages.find]
where = ["src"]
